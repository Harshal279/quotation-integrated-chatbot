<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Quotation Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #111118;
            color: #d1d5db;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: #0d0d14;
            border-right: 1px solid #1e1e2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sb-header {
            padding: 16px 14px;
            border-bottom: 1px solid #1e1e2e;
            flex-shrink: 0;
        }

        .admin-chip {
            background: rgba(239, 68, 68, .08);
            border: 1px solid rgba(239, 68, 68, .25);
            border-radius: 10px;
            padding: 8px 10px;
            margin-bottom: 10px;
        }

        .admin-chip-name {
            color: #f1f5f9;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .admin-chip-role {
            display: inline-block;
            background: rgba(220, 38, 38, .15);
            border: 1px solid rgba(220, 38, 38, .3);
            color: #fca5a5;
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.68rem;
            font-weight: 600;
            margin-left: 6px;
            vertical-align: middle;
        }

        .admin-chip-co {
            color: #9ca3af;
            font-size: 0.72rem;
        }

        .sb-btn {
            width: 100%;
            background: #1c1c2a;
            border: 1px solid #2a2a3e;
            border-radius: 9px;
            color: #d1d5db;
            font-size: 0.82rem;
            padding: 8px 10px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: all .15s;
            margin-bottom: 4px;
        }

        .sb-btn:hover {
            border-color: #7c3aed;
            color: #fff;
        }

        .sb-btn.danger {
            color: #f87171;
        }

        .sb-btn.danger:hover {
            border-color: #f87171;
        }

        .sb-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
        }

        .sb-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .sb-scroll::-webkit-scrollbar-thumb {
            background: #2a2a3e;
            border-radius: 4px;
        }

        .sb-label {
            color: #6b7280;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: 8px 0 6px;
        }

        /* User cards in sidebar */
        .user-card {
            background: #1c1c2a;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all .15s;
        }

        .user-card:hover {
            border-color: #7c3aed;
        }

        .user-card.active {
            border-color: #7c3aed;
            background: rgba(124, 58, 237, .08);
        }

        .uc-name {
            color: #f1f5f9;
            font-size: 0.83rem;
            font-weight: 600;
        }

        .uc-co {
            color: #9ca3af;
            font-size: 0.75rem;
        }

        .uc-meta {
            color: #6b7280;
            font-size: 0.72rem;
            margin-top: 4px;
        }

        .badge {
            display: inline-block;
            background: rgba(124, 58, 237, .15);
            border: 1px solid rgba(124, 58, 237, .3);
            color: #c4b5fd;
            border-radius: 20px;
            padding: 1px 7px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Sessions sublist */
        .session-item {
            padding: 7px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            color: #9ca3af;
            transition: all .15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-item:hover {
            background: #1c1c2a;
            color: #f1f5f9;
        }

        .session-item.active {
            background: rgba(124, 58, 237, .1);
            color: #c4b5fd;
        }

        .session-del {
            background: none;
            border: none;
            color: #4b5563;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 2px 6px;
            border-radius: 6px;
            transition: color .15s;
        }

        .session-del:hover {
            color: #f87171;
        }

        hr {
            border: none;
            border-top: 1px solid #1e1e2e;
            margin: 8px 0;
        }

        /* ── Main ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .main-header {
            padding: 14px 24px;
            border-bottom: 1px solid #1e1e2e;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-av {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .header-title {
            font-weight: 600;
            color: #f1f5f9;
        }

        .header-sub {
            font-size: 0.72rem;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .dot-green {
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 5px #22c55e88;
        }

        /* Chat view */
        .chat-view {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }

        .chat-view::-webkit-scrollbar {
            width: 4px;
        }

        .chat-view::-webkit-scrollbar-thumb {
            background: #2a2a3e;
            border-radius: 4px;
        }

        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #4b5563;
            font-size: 0.9rem;
            gap: 10px;
        }

        .placeholder-icon {
            font-size: 2.5rem;
        }

        /* Chat bubbles (same as user UI) */
        .msg-user {
            display: flex;
            justify-content: flex-end;
            margin: 8px 0;
        }

        .msg-bot {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            margin: 8px 0;
        }

        .bot-av {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .bubble-user {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: #fff;
            padding: 10px 15px;
            border-radius: 18px 18px 4px 18px;
            max-width: 62%;
            font-size: 0.87rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .bubble-bot {
            background: #1c1c2a;
            border: 1px solid #2a2a3e;
            color: #d1d5db;
            padding: 10px 15px;
            border-radius: 18px 18px 18px 4px;
            max-width: 62%;
            font-size: 0.87rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .chat-meta {
            color: #6b7280;
            font-size: 0.75rem;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e1e2e;
        }

        /* Overview grid */
        .overview-grid {
            display: grid;
            gap: 12px;
            padding: 4px 0;
        }

        .ov-card {
            background: #1c1c2a;
            border: 1px solid #2a2a3e;
            border-radius: 14px;
            padding: 16px 18px;
            transition: border-color .15s;
        }

        .ov-card:hover {
            border-color: #3a3a5e;
        }

        .ov-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .ov-name {
            color: #f1f5f9;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .ov-date {
            color: #4b5563;
            font-size: 0.72rem;
        }

        .ov-co {
            color: #9ca3af;
            font-size: 0.8rem;
        }

        .ov-row {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .ov-stat {
            display: flex;
            flex-direction: column;
        }

        .ov-stat-val {
            color: #c4b5fd;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .ov-stat-lbl {
            color: #6b7280;
            font-size: 0.7rem;
        }

        .ov-contacts {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .ov-contact {
            color: #9ca3af;
            font-size: 0.78rem;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2a2a3e;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- ═══ SIDEBAR ═══ -->
    <div class="sidebar">
        <div class="sb-header">
            <div class="admin-chip">
                <div class="admin-chip-name">
                    {{ user.name }}
                    <span class="admin-chip-role">ADMIN</span>
                </div>
                <div class="admin-chip-co">{{ user.company }}</div>
            </div>
            <a href="/logout" class="sb-btn danger" style="display:block;text-decoration:none;">⇥ Logout</a>
        </div>

        <div class="sb-scroll">
            <div class="sb-label" id="sbLabel">Users</div>
            <div id="userList">
                <div class="spinner"></div>
            </div>
            <div id="sessionList" style="display:none"></div>
        </div>
    </div>

    <!-- ═══ MAIN ═══ -->
    <div class="main">
        <div class="main-header">
            <div class="header-av">ADM</div>
            <div>
                <div class="header-title" id="mainTitle">Admin Dashboard</div>
                <div class="header-sub"><span class="dot-green"></span><span id="mainSub">Click a user to view their
                        chats</span></div>
            </div>
        </div>

        <div class="chat-view" id="chatView">
            <div class="placeholder" id="placeholder">
                <div class="placeholder-icon">[Users]</div>
                <div>Select a user from the sidebar to view their chat history</div>
            </div>
            <div id="overviewGrid" class="overview-grid" style="display:none"></div>
            <div id="chatContent" style="display:none"></div>
        </div>
    </div>

    <script>
        let selectedUser = null;
        let selectedSession = null;

        // ─── Load users on page load ──────────────────────────────────────────────────
        async function loadUsers() {
            const res = await fetch('/admin/users');
            const data = await res.json();
            const listEl = document.getElementById('userList');
            const gridEl = document.getElementById('overviewGrid');

            if (!data.success || !data.users.length) {
                listEl.innerHTML = '<div style="color:#4b5563;font-size:0.78rem">No users yet.</div>';
                return;
            }

            // Sidebar user cards
            listEl.innerHTML = '';
            data.users.forEach(u => {
                const card = document.createElement('div');
                card.className = 'user-card';
                card.dataset.key = u.key;
                card.innerHTML = `
      <div class="uc-name">${esc(u.name)}</div>
      <div class="uc-co">${esc(u.company)}</div>
      <div class="uc-meta"><span class="badge">${u.chat_count || 0} chats</span></div>`;
                card.addEventListener('click', () => selectUser(u));
                listEl.appendChild(card);
            });

            // Overview grid
            gridEl.innerHTML = '';
            data.users.forEach(u => {
                const created = u.created_at ? new Date(u.created_at).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
                const div = document.createElement('div');
                div.className = 'ov-card';
                div.innerHTML = `
      <div class="ov-top">
        <div><div class="ov-name">${esc(u.name)}</div><div class="ov-co">${esc(u.company)}</div></div>
        <div class="ov-date">${created}</div>
      </div>
      <div class="ov-contacts">
        <span class="ov-contact">Email: ${esc(u.email || '—')}</span>
        <span class="ov-contact">Phone: ${esc(u.phone || '—')}</span>
      </div>
      <div class="ov-row">
        <div class="ov-stat"><span class="ov-stat-val">${u.chat_count || 0}</span><span class="ov-stat-lbl">Chats</span></div>
      </div>`;
                div.style.cursor = 'pointer';
                div.addEventListener('click', () => selectUser(u));
                gridEl.appendChild(div);
            });

            document.getElementById('placeholder').style.display = 'none';
            gridEl.style.display = 'grid';
        }

        // ─── Select user → load sessions ─────────────────────────────────────────────
        async function selectUser(u) {
            selectedUser = u; selectedSession = null;
            document.querySelectorAll('.user-card').forEach(c => c.classList.remove('active'));
            const card = document.querySelector(`.user-card[data-key="${u.key}"]`);
            if (card) card.classList.add('active');

            document.getElementById('sbLabel').textContent = u.company;
            document.getElementById('mainTitle').textContent = u.company;
            document.getElementById('mainSub').textContent = `${u.name} · Select a session`;
            document.getElementById('overviewGrid').style.display = 'none';
            document.getElementById('chatContent').style.display = 'none';
            document.getElementById('placeholder').style.display = 'none';

            // Load sessions into sidebar
            const sessEl = document.getElementById('sessionList');
            sessEl.innerHTML = '<div class="spinner"></div>';

            // Back button
            const backBtn = document.createElement('button');
            backBtn.className = 'sb-btn';
            backBtn.textContent = '← All Users';
            backBtn.style.marginBottom = '8px';
            backBtn.addEventListener('click', () => {
                selectedUser = null;
                document.getElementById('sbLabel').textContent = 'Users';
                document.getElementById('sessionList').style.display = 'none';
                document.getElementById('userList').style.display = 'block';
                document.getElementById('overviewGrid').style.display = 'grid';
                document.getElementById('placeholder').style.display = 'none';
                document.getElementById('chatContent').style.display = 'none';
                document.getElementById('mainTitle').textContent = 'Admin Dashboard';
                document.getElementById('mainSub').textContent = 'Click a user to view their chats';
            });

            sessEl.innerHTML = '';
            sessEl.appendChild(backBtn);
            document.getElementById('userList').style.display = 'none';
            sessEl.style.display = 'block';

            const res = await fetch(`/admin/user/${u.key}/chats`);
            const data = await res.json();

            if (!data.success || !data.sessions.length) {
                sessEl.insertAdjacentHTML('beforeend', '<div style="color:#4b5563;font-size:0.78rem;padding:4px 6px">No chats yet.</div>');
                return;
            }

            data.sessions.forEach(s => {
                const row = document.createElement('div');
                row.style.display = 'flex'; row.style.alignItems = 'center';
                row.innerHTML = `
      <div class="session-item" data-sid="${s.session_id}" style="flex:1">
        <span style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(s.title)}</span>
        <button class="session-del" data-sid="${s.session_id}" data-ukey="${u.key}" title="Delete">DEL</button>
      </div>`;
                const item = row.querySelector('.session-item');
                item.addEventListener('click', () => loadChat(u.key, s.session_id, s.title, u));
                row.querySelector('.session-del').addEventListener('click', async (e) => {
                    e.stopPropagation();
                    if (!confirm('Delete this session?')) return;
                    await fetch(`/admin/user/${u.key}/chat/${s.session_id}/delete`, { method: 'POST' });
                    row.remove();
                });
                sessEl.appendChild(row);
            });
        }

        // ─── Load and render a chat session ──────────────────────────────────────────
        async function loadChat(userKey, sessionId, title, u) {
            document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
            const active = document.querySelector(`.session-item[data-sid="${sessionId}"]`);
            if (active) active.classList.add('active');

            document.getElementById('mainTitle').textContent = title;
            document.getElementById('mainSub').textContent = `${u.name} · ${u.company}`;

            const chatEl = document.getElementById('chatContent');
            chatEl.style.display = 'block';
            chatEl.innerHTML = '<div class="spinner"></div>';

            const res = await fetch(`/admin/user/${userKey}/chat/${sessionId}`);
            const data = await res.json();

            if (!data.success) { chatEl.textContent = 'Failed to load.'; return; }

            chatEl.innerHTML = `<div class="chat-meta">Session: <b>${esc(title)}</b></div>`;
            data.messages.forEach(m => {
                const safe = m.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const div = document.createElement('div');
                if (m.role === 'user') {
                    div.className = 'msg-user';
                    div.innerHTML = `<div class="bubble-user">${safe}</div>`;
                } else {
                    div.className = 'msg-bot';
                    div.innerHTML = `<div class="bot-av">BOT</div><div class="bubble-bot">${safe}</div>`;
                }
                chatEl.appendChild(div);
            });
        }

        function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        loadUsers();
    </script>
</body>

</html>
