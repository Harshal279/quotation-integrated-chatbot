<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Quotation Builder — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124, 58, 237, .18) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #1c1c2a;
      border: 1px solid #2a2a3e;
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, .5);
      position: relative;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      box-shadow: 0 6px 24px rgba(124, 58, 237, .45);
      margin: 0 auto 18px;
    }

    .title {
      color: #f1f5f9;
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #6b7280;
      font-size: 0.82rem;
      text-align: center;
      margin-bottom: 28px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab {
      flex: 1;
      padding: 9px;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      color: #9ca3af;
      font-size: 0.83rem;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      background: #13131f;
      transition: all .2s;
      text-decoration: none;
    }

    .tab.active {
      background: rgba(124, 58, 237, .18);
      border-color: #7c3aed;
      color: #c4b5fd;
    }

    /* Form panel */
    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    label {
      display: block;
      color: #9ca3af;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 6px;
      margin-top: 14px;
    }

    input {
      width: 100%;
      background: #13131f;
      border: 1px solid #2a2a3e;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 0.88rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }

    input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .15);
    }

    input::placeholder {
      color: #3f3f5a;
    }

    .btn {
      width: 100%;
      margin-top: 20px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.88rem;
      padding: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all .2s;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(124, 58, 237, .45);
    }

    .alert {
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      margin-bottom: 16px;
    }

    .alert-error {
      background: rgba(220, 38, 38, .12);
      border: 1px solid rgba(220, 38, 38, .3);
      color: #fca5a5;
    }

    .alert-success {
      background: rgba(34, 197, 94, .1);
      border: 1px solid rgba(34, 197, 94, .3);
      color: #86efac;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">AI</div>
    <div class="title">AI Quotation Builder</div>
    <div class="subtitle">CRM & Business Proposal Generator</div>

    <div class="tabs">
      <a href="/login" class="tab {% if tab == 'login' %}active{% endif %}">Sign In</a>
      <a href="/register" class="tab {% if tab == 'register' %}active{% endif %}">Register</a>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <!-- Login Panel -->
    <div class="panel {% if tab == 'login' %}active{% endif %}">
      <form method="POST" action="/login">
        <label>Company Name</label>
        <input type="text" name="company" placeholder="e.g. Acme Pvt Ltd" required autocomplete="organization">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required>
        <button type="submit" class="btn">Sign In →</button>
      </form>
    </div>

    <!-- Register Panel -->
    <div class="panel {% if tab == 'register' %}active{% endif %}">
      <form method="POST" action="/register">
        <div class="row2">
          <div>
            <label>Your Name</label>
            <input type="text" name="name" placeholder="Rahul Sharma" required>
          </div>
          <div>
            <label>Company Name</label>
            <input type="text" name="company" placeholder="Acme Pvt Ltd" required>
          </div>
        </div>
        <div class="row2">
          <div>
            <label>Email</label>
            <input type="email" name="email" placeholder="you@company.com" required>
          </div>
          <div>
            <label>Phone</label>
            <input type="tel" name="phone" placeholder="9876543210" required>
          </div>
        </div>
        <label>Password</label>
        <input type="password" name="password" placeholder="Min 6 characters" required>
        <label>Confirm Password</label>
        <input type="password" name="confirm" placeholder="Repeat password" required>
        <button type="submit" class="btn">Create Account →</button>
      </form>
    </div>
  </div>
</body>

</html>
